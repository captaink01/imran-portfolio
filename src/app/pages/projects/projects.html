<div class="projects-page">
  <div class="page-header">
    <span class="label">02 / Projects</span>
    <h2>What I've Built</h2>
    <p class="subtitle">A collection of web and mobile projects showcasing my skills.</p>
  </div>

  <div class="filters">
    <button
      *ngFor="let f of filters"
      class="filter-btn"
      [class.active]="filter === f"
      (click)="setFilter(f)">
      {{ f }}
    </button>
  </div>

  <div class="projects-grid">
    <div class="project-card"
      *ngFor="let p of filtered"
      [class.highlight]="p.highlight">
      <div class="card-top">
        <div class="card-meta">
          <span class="type-badge">{{ p.type }}</span>
          <span class="status" [class.live]="p.status === 'Live'">
            <span class="status-dot"></span>{{ p.status }}
          </span>
        </div>
        <div class="card-links">
          <a *ngIf="p.github" [href]="p.github" target="_blank" class="icon-link" title="GitHub">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/>
            </svg>
          </a>
          <a *ngIf="p.live" [href]="p.live" target="_blank" class="icon-link" title="Live Site">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
          </a>
        </div>
      </div>
      <h3>{{ p.title }}</h3>
      <p>{{ p.description }}</p>
      <div class="tags">
        <span class="tag" *ngFor="let t of p.tags">{{ t }}</span>
      </div>
    </div>
  </div>
</div>
